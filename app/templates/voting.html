<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Session - keep-archive-close</title>
    <link rel="stylesheet" href="{{ root_path }}/static/style.css?v={{ version }}">
</head>
<body>
    <div class="container">
        <h1>Voting Session</h1>

        <div class="voting-area">
            <div class="vote-controls">
                <button id="startVoteBtn" onclick="handleVoteButton()" class="btn btn-start">Start New Vote</button>
                <div class="timer-input-group">
                    <input type="number" id="timerDuration" min="1" max="999" value="15" class="timer-input">
                    <label for="timerDuration" class="timer-label">seconds</label>
                </div>
            </div>

            <div id="timerDisplay" class="timer" style="display: none;">
                <span id="timerValue">15</span>
            </div>

            <div id="votingButtons" class="vote-buttons" style="display: none;">
                <button onclick="vote('keep')" class="btn vote-btn btn-keep" disabled>Keep</button>
                <button onclick="vote('archive')" class="btn vote-btn btn-archive" disabled>Archive</button>
                <button onclick="vote('close')" class="btn vote-btn btn-close" disabled>Close</button>
            </div>

            <div id="results" class="results" style="display: none;">
                <div id="resultsContent"></div>
            </div>
        </div>

        <div class="users-section">
            <h3>Participants</h3>
            <ul id="userList"></ul>
        </div>

        <div class="session-info">
            <p>Session ID: <code id="sessionId">{{ session_id }}</code> <a href="#" id="disconnectBtn" class="disconnect-link">Leave Session</a></p>
            <p>You are: <span id="currentUserName" class="user-name-edit">{{ user_name }}</span></p>
            <p>Your color: <input type="color" id="userColor" value="{{ user_color }}" class="color-picker"></p>
        </div>
    </div>

    <script>
        // Root path for subpath deployment support
        const ROOT_PATH = '{{ root_path }}';
        const sessionId = '{{ session_id }}';
        let initialUserName = '{{ user_name }}';
        const initialUserColor = '{{ user_color }}';

        // Check if name is missing and prompt for it
        if (!initialUserName || initialUserName.trim() === '') {
            // Try to get from localStorage first
            const savedName = localStorage.getItem('userName');
            if (savedName && savedName.trim() !== '') {
                initialUserName = savedName;
            } else {
                // Prompt user to enter their name
                while (!initialUserName || initialUserName.trim() === '') {
                    initialUserName = prompt('Please enter your name to join this session:');
                    if (initialUserName === null) {
                        // User cancelled, redirect to home
                        window.location.href = ROOT_PATH + '/';
                    }
                }
                initialUserName = initialUserName.trim();
                // Save to localStorage
                localStorage.setItem('userName', initialUserName);
            }
        }

        let currentUserName = initialUserName;
        let currentUserColor = initialUserColor;
        let connectionId = null;
        let ws = null;
        let heartbeatInterval = null;
        let voteIsActive = false;
        let myVote = null;
        let customTimerDuration = 15;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}${ROOT_PATH}/ws/${sessionId}`);

            ws.onopen = function() {
                console.log('WebSocket connected');
                // Send join message
                ws.send(JSON.stringify({
                    type: 'join',
                    name: currentUserName,
                    color: currentUserColor
                }));

                // Start heartbeat
                heartbeatInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'heartbeat' }));
                    }
                }, 5000); // Send heartbeat every 5 seconds
            };

            ws.onmessage = function(event) {
                const message = JSON.parse(event.data);
                handleMessage(message);
            };

            ws.onclose = function() {
                console.log('WebSocket disconnected');
                clearInterval(heartbeatInterval);
                // Attempt to reconnect after 2 seconds
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        function handleMessage(message) {
            switch (message.type) {
                case 'state_update':
                    updateUserList(message.users);
                    voteIsActive = message.vote_active;
                    if (message.vote_active) {
                        // Sync timer duration across all clients
                        if (message.vote_duration) {
                            customTimerDuration = message.vote_duration;
                            document.getElementById('timerDuration').value = message.vote_duration;
                        }
                        showVotingButtons();
                        updateVoteButton(true);
                        document.getElementById('results').style.display = 'none';
                    } else {
                        hideVotingButtons();
                        updateVoteButton(false);
                        myVote = null;
                        clearVoteSelection();
                    }
                    break;

                case 'timer_update':
                    updateTimer(message.remaining);
                    break;

                case 'vote_results':
                    voteIsActive = false;
                    showResults(message.results, message.winner, message.tied_options);
                    hideTimer();
                    hideVotingButtons();
                    updateVoteButton(false);
                    break;
            }
        }

        function handleVoteButton() {
            if (voteIsActive) {
                abandonVote();
            } else {
                startVote();
            }
        }

        function startVote() {
            // Get and validate timer duration
            const durationInput = document.getElementById('timerDuration');
            let duration = parseInt(durationInput.value);

            // Validate: must be positive integer
            if (isNaN(duration) || duration < 1) {
                duration = 15;
                durationInput.value = 15;
            } else if (duration > 999) {
                duration = 999;
                durationInput.value = 999;
            }

            customTimerDuration = duration;

            ws.send(JSON.stringify({
                type: 'start_vote',
                duration: customTimerDuration
            }));
        }

        function abandonVote() {
            ws.send(JSON.stringify({ type: 'abandon_vote' }));
        }

        function updateVoteButton(isActive) {
            const btn = document.getElementById('startVoteBtn');
            const timerInput = document.getElementById('timerDuration');

            if (isActive) {
                btn.textContent = 'Abandon Vote';
                btn.classList.remove('btn-start');
                btn.classList.add('btn-abandon');
                timerInput.disabled = true;
            } else {
                btn.textContent = 'Start New Vote';
                btn.classList.remove('btn-abandon');
                btn.classList.add('btn-start');
                timerInput.disabled = false;
            }
            btn.disabled = false;
        }

        function vote(choice) {
            ws.send(JSON.stringify({
                type: 'vote',
                vote: choice
            }));
            myVote = choice;
            highlightVoteSelection(choice);
        }

        function highlightVoteSelection(choice) {
            // Remove previous selection
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.classList.remove('selected');
            });

            // Highlight selected button
            const buttonClasses = {
                'keep': 'btn-keep',
                'archive': 'btn-archive',
                'close': 'btn-close'
            };
            const selectedBtn = document.querySelector(`.${buttonClasses[choice]}`);
            if (selectedBtn) {
                selectedBtn.classList.add('selected');
            }
        }

        function clearVoteSelection() {
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
        }

        function updateUserList(users) {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';

            users.forEach(user => {
                const li = document.createElement('li');
                li.textContent = user.name;
                li.style.borderLeft = `4px solid ${user.color}`;
                if (!user.has_voted) {
                    li.classList.add('dimmed');
                }
                userList.appendChild(li);
            });
        }

        function showVotingButtons() {
            document.getElementById('votingButtons').style.display = 'flex';
            enableVotingButtons();
            showTimer();
        }

        function hideVotingButtons() {
            document.getElementById('votingButtons').style.display = 'none';
        }

        function enableVotingButtons() {
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        function disableVotingButtons() {
            document.querySelectorAll('.vote-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        function showTimer() {
            const timerDisplay = document.getElementById('timerDisplay');
            // Only reset timer value if it's currently hidden (starting fresh vote)
            if (timerDisplay.style.display === 'none') {
                document.getElementById('timerValue').textContent = customTimerDuration;
            }
            timerDisplay.style.display = 'block';
        }

        function hideTimer() {
            document.getElementById('timerDisplay').style.display = 'none';
        }

        function updateTimer(remaining) {
            document.getElementById('timerValue').textContent = remaining;
        }

        function showResults(results, winner, tiedOptions) {
            const resultsContent = document.getElementById('resultsContent');

            let winnerText;
            if (winner === 'tie' && tiedOptions && tiedOptions.length > 0) {
                // Capitalize each tied option
                const capitalizedOptions = tiedOptions.map(opt => opt.charAt(0).toUpperCase() + opt.slice(1));
                // Join with Oxford comma and "and" for the last item
                const optionsText = capitalizedOptions.length === 2
                    ? capitalizedOptions.join(' and ')
                    : capitalizedOptions.slice(0, -1).join(', ') + ', and ' + capitalizedOptions[capitalizedOptions.length - 1];
                winnerText = `Winner: TIE (${optionsText})`;
            } else {
                winnerText = `Winner: ${winner.toUpperCase()}`;
            }

            resultsContent.innerHTML = `
                <div class="winner">${winnerText}</div>
                <div class="result-item">Keep: ${results.keep}</div>
                <div class="result-item">Archive: ${results.archive}</div>
                <div class="result-item">Close: ${results.close}</div>
            `;
            document.getElementById('results').style.display = 'block';
        }

        // Make user name editable
        document.getElementById('currentUserName').addEventListener('click', function() {
            const newName = prompt('Enter your new name:', currentUserName || '');
            if (newName && newName.trim()) {
                currentUserName = newName.trim();
                this.textContent = currentUserName;
                // Save to localStorage
                localStorage.setItem('userName', currentUserName);
                ws.send(JSON.stringify({
                    type: 'rename',
                    name: currentUserName
                }));
            }
        });

        // Handle color changes
        document.getElementById('userColor').addEventListener('change', function() {
            currentUserColor = this.value;
            // Save to localStorage
            localStorage.setItem('userColor', currentUserColor);
            ws.send(JSON.stringify({
                type: 'change_color',
                color: currentUserColor
            }));
        });

        // Handle disconnect
        document.getElementById('disconnectBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Are you sure you want to leave this session?')) {
                // Close WebSocket connection
                if (ws) {
                    ws.close();
                }
                // Clear heartbeat
                if (heartbeatInterval) {
                    clearInterval(heartbeatInterval);
                }
                // Navigate to home
                window.location.href = ROOT_PATH + '/';
            }
        });

        // Connect on page load
        connectWebSocket();
    </script>
</body>
</html>
