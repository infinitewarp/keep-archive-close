# Example nginx configuration for serving keep-archive-close under a subpath
# This example shows how to serve the app at example.com/kac
#
# Prerequisites:
# 1. Container running with ROOT_PATH=/kac:
#    podman run -d -p 8000:8000 -e ROOT_PATH=/kac ghcr.io/infinitewarp/keep-archive-close:latest
#
# 2. Add this location block to your nginx server configuration

server {
    listen 80;
    server_name example.com;

    # Your other content at the root
    location / {
        # Your existing root content configuration
        root /var/www/html;
        index index.html;
    }

    # keep-archive-close at /kac subpath
    location /kac {
        # Proxy to the container
        proxy_pass http://localhost:8000;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (REQUIRED for real-time voting updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400;  # 24 hours
        proxy_send_timeout 86400;  # 24 hours

        # Disable buffering for WebSocket
        proxy_buffering off;
    }
}

# For HTTPS (recommended for production):
server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;

    # Your other content at the root
    location / {
        root /var/www/html;
        index index.html;
    }

    # keep-archive-close at /kac subpath
    location /kac {
        proxy_pass http://localhost:8000;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (REQUIRED)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Disable buffering
        proxy_buffering off;
    }
}

# Alternative: Docker Compose setup
# Create a docker-compose.yml file:
#
# services:
#   keep-archive-close:
#     image: ghcr.io/infinitewarp/keep-archive-close:latest
#     environment:
#       - ROOT_PATH=/kac
#     ports:
#       - "127.0.0.1:8000:8000"
#     restart: unless-stopped
#
# Then run: docker-compose up -d
